# robot_config.yaml
/**:
  ros__parameters:
    # --- Hardware Settings ---
    device_name: '/dev/ttyUSB0'
    baudrate: 57600
    arm_id: 0
    claw_id: 1

    # --- Servo Physical Limits (Degrees) ---
    # 252.0 = Horizontal (Arm Up)
    # 177.0 = Vertical (Arm Down / Camera looking at floor)
    arm_raised_deg: 270.0
    arm_lowered_deg: 177.0

    # --- Claw Positions ---
    claw_open_deg: 152.0
    claw_closed_deg: 175.0

    # --- Tracking Behavior ---
    target_dist: 0.1
    grab_dist: 0.30
    tilt_start_dist: 0.6

    # --- Camera Mode ---
    # use_zed: false → RealSense only for all ranges (Choice 1, default)
    # use_zed: true  → ZED for far range, RealSense for close range (Choice 2)
    use_zed: false